# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1

env:
  - variable: NEXT_PUBLIC_SUPABASE_URL
    secret: NEXT_PUBLIC_SUPABASE_URL

  - variable: NEXT_PUBLIC_SUPABASE_ANON_KEY
    secret: NEXT_PUBLIC_SUPABASE_ANON_KEY

  - variable: APOLLO_WEBHOOK_BASE_URL
    secret: APOLLO_WEBHOOK_BASE_URL

  - variable: VANE_BASE_URL
    secret: VANE_BASE_URL

  - variable: VANE_PROVIDER_NAME
    value: OpenAI

  - variable: VANE_CHAT_MODEL_KEY
    value: gpt-4o-mini

  - variable: VANE_EMBEDDING_MODEL_KEY
    value: text-embedding-3-small

  - variable: VANE_AUTH_HEADER_NAME
    value: x-vane-auth

  - variable: VANE_TIMEOUT_MS
    value: "240000"

  - variable: VANE_AUTH_HEADER_VALUE
    secret: VANE_AUTH_HEADER_VALUE

  - variable: LEAD_RESEARCH_WORKER_SECRET
    secret: LEAD_RESEARCH_WORKER_SECRET

  - variable: SUPABASE_SERVICE_ROLE_KEY
    secret: SUPABASE_SERVICE_ROLE_KEY

  - variable: APOLLO_API_KEY
    secret: APOLLO_API_KEY

  - variable: API_SECRET_KEY
    secret: API_SECRET_KEY
